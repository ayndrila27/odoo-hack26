{% extends "base.html" %}
{% block title %}Edit profile — NovaHR{% endblock %}
{% block content %}

<div class="page-head">
  <span class="eyebrow">Profile</span>
  <h1>Edit your details</h1>
  <span class="desc">You can update your contact information. Job and salary details are managed by HR.</span>
</div>

<div class="card" style="max-width:520px;">
  <form method="POST" action="{{ url_for('profile.edit_profile') }}">
    <div class="field">
      <label>Full name</label>
      <input type="text" value="{{ user.full_name }}" disabled>
      <span class="hint">Contact HR to change your legal name.</span>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="text" value="{{ user.email }}" disabled>
    </div>
    <div class="field">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" value="{{ user.phone or '' }}" placeholder="+91 98765 43210">
    </div>
    <div class="field">
      <label for="address">Address</label>
      <textarea id="address" name="address" placeholder="Street, city, state, PIN">{{ user.address or '' }}</textarea>
    </div>

    <div style="display:flex; gap:10px;">
      <button type="submit" class="btn btn-primary">Save changes</button>
      <a href="{{ url_for('profile.profile') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
